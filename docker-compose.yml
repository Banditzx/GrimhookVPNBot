services:
  grimhook-vpn-bot:
    build: .
    container_name: grimhook-vpn-bot
    restart: unless-stopped
    environment:
      BOT_DATABASE_PATH: /app/data/users.db
      BOT_TOKEN: ${BOT_TOKEN}
      ADMINS: ${ADMINS}
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD}
      TRIAL_DAYS: ${TRIAL_DAYS:-1}
      PRICE_1_DAY_RUB: ${PRICE_1_DAY_RUB:-25}
      PRICE_7_DAYS_RUB: ${PRICE_7_DAYS_RUB:-125}
      PRICE_1_MONTH_RUB: ${PRICE_1_MONTH_RUB:-350}
      PRICE_2_MONTHS_RUB: ${PRICE_2_MONTHS_RUB:-700}
      PRICE_3_MONTHS_RUB: ${PRICE_3_MONTHS_RUB:-1050}
      DISCOUNT_1_DAY_PERCENT: ${DISCOUNT_1_DAY_PERCENT:-0}
      DISCOUNT_7_DAYS_PERCENT: ${DISCOUNT_7_DAYS_PERCENT:-0}
      DISCOUNT_1_MONTH_PERCENT: ${DISCOUNT_1_MONTH_PERCENT:-0}
      DISCOUNT_2_MONTHS_PERCENT: ${DISCOUNT_2_MONTHS_PERCENT:-0}
      DISCOUNT_3_MONTHS_PERCENT: ${DISCOUNT_3_MONTHS_PERCENT:-0}
      STAR_PRICE_MARKUP_PERCENT: ${STAR_PRICE_MARKUP_PERCENT:-10}
      STAR_RUB_RATE: ${STAR_RUB_RATE:-1.66}
      XUI_API_URL: ${XUI_API_URL}
      XUI_HOST: ${XUI_HOST}
      XUI_BASE_PATH: ${XUI_BASE_PATH}
      XUI_SERVER_NAME: ${XUI_SERVER_NAME:-Grimhook VPN}
      XUI_USERNAME: ${XUI_USERNAME:-admin}
      XUI_TOKEN: ${XUI_TOKEN}
      INBOUND_ID: ${INBOUND_ID:-1}
      XUI_MANAGED_CLIENT_PREFIX: ${XUI_MANAGED_CLIENT_PREFIX:-user_}
      REALITY_PUBLIC_KEY: ${REALITY_PUBLIC_KEY:-}
      REALITY_FINGERPRINT: ${REALITY_FINGERPRINT:-chrome}
      REALITY_SNI: ${REALITY_SNI:-}
      REALITY_SHORT_ID: ${REALITY_SHORT_ID:-}
      REALITY_SPIDER_X: ${REALITY_SPIDER_X:-/}
    ports:
      - "8501:8501"
    volumes:
      - grimhook_vpn_data:/app/data

volumes:
  grimhook_vpn_data:
    external: true
    name: grimhook_vpn_data
